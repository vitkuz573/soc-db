version: 2.1.{build}

image: Ubuntu

clone_depth: 1

environment:
  matrix:
    - PYTHON: "3.12"
    - PYTHON: "3.13"
    - PYTHON: "3.14"

matrix:
  fast_finish: true
  allow_failures:
    - PYTHON: "3.14"

skip_branch_with_pr: true

install:
  - pyenv install $PYTHON -s
  - pyenv global $PYTHON
  - python --version
  - pip install -e ".[dev]"
  - pre-commit install

build: off

test_script:
  - make ci
  - make security

after_test:
  - pre-commit run --all-files --show-diff-on-failure || true

