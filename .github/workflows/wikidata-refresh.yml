name: Wikidata Knowledge Refresh
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (default: true)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run Wikidata refresh
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            soc-db wikidata-refresh --dry-run
          else
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              soc-db wikidata-refresh --dry-run
            else
              soc-db wikidata-refresh
            fi
          fi
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(wikidata): refresh vendor knowledge"
          title: "chore(wikidata): refresh vendor knowledge from Wikidata"
          body: |
            Automated vendor knowledge refresh from Wikidata SPARQL queries.

            - **Process node (P2175)**: Updated per-vendor process maps
            - **GPU (P488)**: Updated per-vendor GPU maps
            - **Architecture (P10620)**: Updated per-vendor architecture

            Review the diff before merging. If incorrect values appear,
            add overrides to `data/vendor_overrides.json`.
          branch: wikidata-refresh
          delete-branch: true
          labels: wikidata,automated
